<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayco Team Board</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0079c1;--blue-dark:#004f7d;--blue-light:#00aeef;
  --charcoal:#2e3238;--bg:#eef0f3;--surface:#fff;
  --surface2:#f5f6f8;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1d21;--text2:#5a6270;--text3:#9aa0aa;
  --r:8px;--r-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

.header{background:var(--blue);padding:0 16px;display:flex;align-items:center;gap:12px;height:50px;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.logo{font-size:17px;font-weight:700;color:white;letter-spacing:.04em}
.logo span{font-weight:300;opacity:.75}.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.saved{font-size:12px;color:rgba(255,255,255,.55)}
.hbtn{font-size:12px;padding:5px 12px;border-radius:var(--r);cursor:pointer;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);color:white;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn svg{width:14px;height:14px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* BOARD - absolute canvas */
.board-wrap{padding:14px;overflow:auto;min-height:calc(100vh - 50px)}
.board-canvas{position:relative;min-width:1600px;min-height:800px}
/* COLUMN */
.col{width:300px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);display:flex;flex-direction:column;height:fit-content;flex-shrink:0}
.col.dragging{opacity:.3}
.col.drag-over{outline:2.5px dashed var(--blue);outline-offset:2px}

.col-header{padding:9px 10px;display:flex;align-items:center;gap:6px;color:white;border-radius:var(--r-lg) var(--r-lg) 0 0;cursor:grab;user-select:none}
.col-header:active{cursor:grabbing}
.drag-dots{color:rgba(255,255,255,.4);display:flex;align-items:center;flex-shrink:0}
.drag-dots svg{width:12px;height:12px;fill:currentColor}
.col-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-hbtns{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.col-header:hover .col-hbtns{opacity:1}
.hicon{width:24px;height:24px;border:none;background:rgba(255,255,255,.18);border-radius:4px;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.hicon:hover{background:rgba(255,255,255,.35)}
.hicon svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.col-chevron{width:14px;height:14px;flex-shrink:0;stroke:rgba(255,255,255,.7);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;cursor:pointer}
.col.collapsed .col-chevron{transform:rotate(-90deg)}
.col-body{padding:8px;flex:1}
.col.collapsed .col-body,.col.collapsed .col-footer{display:none}

/* GROUP */
.group{margin-bottom:10px}
.group-header{display:flex;align-items:center;gap:5px;margin-bottom:4px;padding:0 2px}
.group-label{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-hbtns{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.group-header:hover .group-hbtns{opacity:1}
.gicon{width:18px;height:18px;border:none;background:none;border-radius:3px;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:color .12s,background .12s}
.gicon:hover{color:var(--blue);background:rgba(0,121,193,.09)}
.gicon.del:hover{color:#d0342c;background:rgba(208,52,44,.09)}
.gicon svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.group-divider{height:1px;background:var(--border2);margin-bottom:4px}

/* TASK */
.task-row{margin-bottom:3px}
.task{display:flex;align-items:flex-start;gap:6px;padding:4px 5px;border-radius:6px;transition:background .1s}
.task:hover{background:#eaf2fb}
.task input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--blue);cursor:pointer;width:14px;height:14px}
.task-text{font-size:13px;color:var(--text);line-height:1.45;flex:1;word-break:break-word;cursor:pointer}
.task.done .task-text{text-decoration:line-through;color:var(--text3)}
.task-actions{display:none;gap:2px;flex-shrink:0;margin-top:1px}
.task:hover .task-actions{display:flex}
.ticon{width:20px;height:20px;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:3px;display:flex;align-items:center;justify-content:center;transition:color .1s,background .1s}
.ticon:hover{color:var(--blue);background:rgba(0,121,193,.09)}
.ticon.del:hover{color:#d0342c;background:rgba(208,52,44,.09)}
.ticon svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* SUBTASKS */
.subtasks{margin-left:20px;border-left:2px solid var(--border2);padding-left:8px;margin-top:2px;margin-bottom:2px}
.subtask .task-text{font-size:12.5px;color:var(--text2)}

/* COMMENTS */
.comments{margin-left:20px;padding-left:8px;border-left:2px solid #ffc94d;margin-bottom:4px}
.comment{font-size:12px;color:var(--text2);padding:2px 0;display:flex;align-items:flex-start;gap:4px;line-height:1.4}
.comment-text{flex:1}
.comment-del{border:none;background:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0 2px;display:none}
.comment:hover .comment-del{display:block}
.comment-del:hover{color:#d0342c}

/* ADD BUTTONS */
.add-btn{display:flex;align-items:center;gap:5px;width:100%;border:none;background:none;color:var(--text3);font-size:12px;cursor:pointer;padding:3px 5px;border-radius:5px;font-family:inherit;text-align:left;transition:color .1s,background .1s;margin-top:2px}
.add-btn:hover{color:var(--blue);background:rgba(0,121,193,.06)}
.add-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0}

/* COLUMN FOOTER */
.col-footer{padding:6px 8px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.footer-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;border-radius:var(--r);border:1.5px dashed var(--border2);background:none;cursor:pointer;font-size:11px;font-family:inherit;color:var(--text2);transition:all .15s;width:100%}
.footer-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(0,121,193,.05)}
.footer-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0}

/* COLUMN WRAPPER */
.col-wrap{display:inline-flex;flex-direction:column;gap:6px;align-items:flex-start;flex-shrink:0;align-self:flex-start}
.add-below-btn{width:300px;height:32px;background:rgba(255,255,255,.5);border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text3);font-size:11px;font-family:inherit;transition:all .15s}
.add-below-btn:hover{background:white;color:var(--blue);border-color:var(--blue)}
.add-below-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.add-col-btn{width:50px;height:50px;background:rgba(255,255,255,.5);border:2px dashed var(--border2);border-radius:var(--r-lg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-family:inherit;transition:all .15s;flex-shrink:0}
.add-col-btn:hover{background:white;color:var(--blue);border-color:var(--blue)}
.add-col-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:22px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.16);border:1px solid var(--border2)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.modal label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.modal input,.modal textarea{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text);margin-bottom:10px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,121,193,.1)}
.modal textarea{resize:vertical;min-height:70px}
.color-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:#1a1d21;transform:scale(1.1)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.mbtn{font-size:13px;padding:8px 16px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;transition:background .1s}
.mbtn:hover{background:#e4e6e9}
.mbtn.ok{background:var(--blue);color:white;border-color:var(--blue)}
.mbtn.ok:hover{background:var(--blue-dark)}
.mbtn.danger{background:#d0342c;color:white;border-color:#d0342c}
.mbtn.danger:hover{background:#a8261f}
.confirm-text{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--charcoal);color:white;padding:9px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="logo">JAYCO <span>Planning Team Board</span></div>
  <div class="header-right">
    <span class="saved" id="saved-lbl">Saved just now</span>
    <button class="hbtn" onclick="clearDone()">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Clear done
    </button>
    <button class="hbtn" onclick="exportMd()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </div>
</div>

<div class="board-wrap">
  <div class="board-canvas" id="board"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="m-title"></h3>
    <div id="m-body"></div>
    <div class="modal-btns" id="m-btns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SK = 'jayco_v7';
const COLORS = [
  '#0079c1','#00aeef','#004f7d','#2e3238',
  '#1a7a4a','#27ae60','#7a3a8b','#9b59b6',
  '#b85c00','#e67e22','#7a1a1a','#c0392b',
  '#2c3e50','#7f8c8d','#d4ac0d','#1abc9c',
];
const SVG = {
  plus:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  trash: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>',
  edit:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  msg:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
  dots:  '<svg width="12" height="12" viewBox="0 0 8 14" fill="currentColor"><circle cx="2" cy="2" r="1.2"/><circle cx="6" cy="2" r="1.2"/><circle cx="2" cy="7" r="1.2"/><circle cx="6" cy="7" r="1.2"/><circle cx="2" cy="12" r="1.2"/><circle cx="6" cy="12" r="1.2"/></svg>',
};

const DEF = {columns:[
  {id:'jcin',label:'JCIN',color:'#0079c1',collapsed:false,row:0,col:0,groups:[
    {id:'g0',label:'',tasks:[
      {id:'t1',text:'Auto save paperwork files',done:false,subs:[],comments:[]},
      {id:'t2',text:'Eliminate paperwork',done:false,subs:[],comments:[]},
      {id:'t3',text:'Summary to replace spec sheets',done:false,subs:[],comments:[]},
      {id:'t4',text:'New run tracker – scope further uses',done:false,subs:[],comments:[]},
    ]}
  ]},
  {id:'projects',label:'Projects',color:'#0079c1',collapsed:false,row:0,col:1,groups:[
    {id:'g1',label:'15KW Battery Trial',tasks:[
      {id:'t5',text:'Cradles',done:false,subs:[],comments:[]},
      {id:'t6',text:'Batts',done:false,subs:[],comments:[]},
      {id:'t7',text:'Lifter',done:false,subs:[],comments:[]},
      {id:'t8',text:'Choose unit for 2nd fitment',done:false,subs:[],comments:[]},
    ]},
    {id:'g2',label:'Schedule 19.61-2 SC-MY26.5',tasks:[
      {id:'t9',text:'Does .5 work',done:false,subs:[{id:'s1',text:'We have errors (noted)',done:false,comments:[]}],comments:[]},
      {id:'t10',text:'Set new specs',done:false,subs:[],comments:[]},
      {id:'t11',text:'Release run',done:false,subs:[],comments:[]},
    ]},
    {id:'g3',label:'Schedule 16.67-5 Full Height Proto',tasks:[
      {id:'t12',text:'DWG package ready',done:false,subs:[],comments:[]},
      {id:'t13',text:'Released to prod',done:false,subs:[],comments:[]},
    ]},
    {id:'g4',label:'Schedule 21.66-4.AV Proto',tasks:[
      {id:'t14',text:'DWG package',done:false,subs:[],comments:[]},
      {id:'t15',text:'Chassis package 4T (OLI)',done:false,subs:[],comments:[]},
      {id:'t16',text:'Released to production',done:false,subs:[],comments:[]},
    ]},
    {id:'g5',label:'15.48-MY25',tasks:[
      {id:'t17',text:'Is specs okay',done:false,subs:[],comments:[]},
      {id:'t18',text:'Schedule unit',done:false,subs:[],comments:[]},
      {id:'t19',text:'Release to prod',done:false,subs:[],comments:[]},
    ]},
    {id:'g6',label:'12V Step',tasks:[
      {id:'t20',text:'Introduce July',done:false,subs:[],comments:[]},
      {id:'t21',text:'More testing',done:false,subs:[],comments:[]},
    ]},
  ]},
  {id:'scott',label:'Scott Jones',color:'#00aeef',collapsed:false,row:0,col:2,groups:[
    {id:'g7',label:'Renault',tasks:[
      {id:'t22',text:'Renault proto plan',done:false,subs:[],comments:[]},
      {id:'t23',text:'Move Renault forward?',done:true,subs:[],comments:[]},
      {id:'t24',text:'20x Fiat missing rear windows',done:true,subs:[{id:'s2',text:'Add 5x options as per NM',done:true,comments:[]}],comments:[]},
      {id:'t25',text:'Put blinds/rear screens in cell',done:false,subs:[],comments:[]},
    ]},
    {id:'g8',label:'Campervan',tasks:[
      {id:'t26',text:'Continue campervan BOM',done:false,subs:[{id:'s3',text:'Move to changes',done:false,comments:[]}],comments:[]},
    ]},
    {id:'g9',label:'Scheduling',tasks:[
      {id:'t27',text:'Schedule build rate scenarios',done:false,subs:[],comments:[]},
      {id:'t28',text:'Model mix check',done:false,subs:[],comments:[]},
      {id:'t29',text:'Series qty',done:false,subs:[],comments:[]},
      {id:'t30',text:'Model qty',done:false,subs:[],comments:[]},
      {id:'t31',text:'Auto cycle calculator',done:false,subs:[],comments:[]},
      {id:'t32',text:'Models available vs scheduled vs sold',done:false,subs:[],comments:[]},
      {id:'t33',text:'Run sizes out – side parameters',done:false,subs:[],comments:[]},
    ]},
  ]},
  {id:'chris',label:'Chris Ryan',color:'#004f7d',collapsed:false,row:0,col:3,groups:[
    {id:'g10',label:'',tasks:[
      {id:'t34',text:'Auto assigning cabs',done:false,subs:[{id:'s4',text:'Manual when required (EFP)',done:false,comments:[]}],comments:[]},
      {id:'t35',text:'Add VINs to FileMaker',done:false,subs:[],comments:[]},
      {id:'t36',text:'1 page summaries to replace spec pack',done:false,subs:[],comments:[]},
    ]}
  ]},
  {id:'gerry',label:'Gerry Ryan',color:'#2e3238',collapsed:false,row:0,col:4,groups:[
    {id:'g11',label:'Programming',tasks:[
      {id:'t37',text:'New auto edging machine',done:false,subs:[{id:'s5',text:'Need software for trials',done:false,comments:[]}],comments:[]},
      {id:'t38',text:'Double sided LMX – is it fixed?',done:false,subs:[{id:'s6',text:'Check upcoming runs Kroma',done:false,comments:[]}],comments:[]},
    ]},
    {id:'g12',label:'Motorised',tasks:[
      {id:'t39',text:'Build rate to 5 on MH',done:false,subs:[],comments:[]},
    ]},
  ]},
]};

let data = JSON.parse(localStorage.getItem(SK)||'null') || JSON.parse(JSON.stringify(DEF));
let pending = null;
let selColor = COLORS[0];
let dragId = null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

function save(){
  localStorage.setItem(SK,JSON.stringify(data));
  const t=new Date();
  document.getElementById('saved-lbl').textContent='Saved '+t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const COL_W = 300;
const COL_GAP = 10;

function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  if(!data.columns.length) return;

  const sorted = [...data.columns].sort((a,b)=> a.row!==b.row ? a.row-b.row : a.col-b.col);

  // First pass: render all columns into the DOM so we can measure them
  // Track wrappers by colId
  const wrappers = {};

  sorted.forEach(col => {
    const wrap = document.createElement('div');
    wrap.style.cssText = `position:absolute;left:0;top:0;width:${COL_W}px;visibility:hidden;`;
    wrap.dataset.colId = col.id;

    const colEl = makeColInner(col);
    wrap.appendChild(colEl);

    const addBelow = document.createElement('button');
    addBelow.className = 'add-below-btn';
    addBelow.innerHTML = SVG.plus + '<span>New column below</span>';
    addBelow.onclick = () => openModal('new-col', col.id, null, 'below');
    wrap.appendChild(addBelow);

    board.appendChild(wrap);
    wrappers[col.id] = wrap;
  });

  // Second pass: measure heights and position correctly
  // colBottom[colIndex] tracks the Y bottom of the last thing placed in that column slot
  const colBottom = {};

  const positioned = {}; // colId -> {x, y}

  // Group rows
  const rowMap = {};
  sorted.forEach(c => { if(!rowMap[c.row]) rowMap[c.row] = []; rowMap[c.row].push(c); });

  Object.keys(rowMap).sort((a,b)=>+a-+b).forEach(r => {
    rowMap[r].forEach(col => {
      const x = col.col * (COL_W + COL_GAP);
      const y = colBottom[col.col] || 0;
      positioned[col.id] = {x, y};
      const h = wrappers[col.id].offsetHeight;
      colBottom[col.col] = y + h + COL_GAP;
    });
  });

  // Apply real positions and show
  sorted.forEach(col => {
    const {x, y} = positioned[col.id];
    const wrap = wrappers[col.id];
    wrap.style.cssText = `position:absolute;left:${x}px;top:${y}px;width:${COL_W}px;display:flex;flex-direction:column;gap:6px;`;
  });

  // Set canvas size
  let maxRight = 0, maxBottom = 0;
  sorted.forEach(col => {
    const {x, y} = positioned[col.id];
    const h = wrappers[col.id].offsetHeight;
    if(x + COL_W > maxRight) maxRight = x + COL_W;
    if(y + h > maxBottom) maxBottom = y + h;
  });
  board.style.width = (maxRight + 60) + 'px';
  board.style.height = (maxBottom + 60) + 'px';

  // Add column button (end of row 0)
  const row0 = rowMap[0] || [];
  const maxCol0 = row0.length ? Math.max(...row0.map(c=>c.col)) : -1;
  const addX = (maxCol0 + 1) * (COL_W + COL_GAP);
  const addEnd = document.createElement('button');
  addEnd.className = 'add-col-btn';
  addEnd.title = 'Add column';
  addEnd.innerHTML = SVG.plus;
  addEnd.style.cssText = `position:absolute;left:${addX}px;top:0`;
  addEnd.onclick = () => openModal('new-col', null, null, {row:0, col:maxCol0+1});
  board.appendChild(addEnd);
}

function makeColInner(col){
  const el=document.createElement('div');
  el.className='col'+(col.collapsed?' collapsed':'');
  el.dataset.id=col.id;
  el.draggable=true;
  el.addEventListener('dragstart',onDragStart);
  el.addEventListener('dragover',onDragOver);
  el.addEventListener('dragleave',onDragLeave);
  el.addEventListener('drop',onDrop);
  el.addEventListener('dragend',onDragEnd);

  let html=`<div class="col-header" style="background:${col.color}">
    <div class="drag-dots">${SVG.dots}</div>
    <span class="col-title">${col.label}</span>
    <div class="col-hbtns" onclick="event.stopPropagation()">
      <button class="hicon" title="Edit" onclick="openModal('edit-col','${col.id}',null,null)">${SVG.edit}</button>
      <button class="hicon" title="Delete" onclick="openModal('del-col','${col.id}',null,null)">${SVG.trash}</button>
    </div>
    <svg class="col-chevron" viewBox="0 0 24 24" onclick="event.stopPropagation();toggleCol('${col.id}')"><polyline points="6 9 12 15 18 9"/></svg>
  </div>`;

  html+=`<div class="col-body">`;
  col.groups.forEach(group=>{
    html+=`<div class="group">`;
    if(group.label){
      html+=`<div class="group-header">
        <span class="group-label">${group.label}</span>
        <div class="group-hbtns">
          <button class="gicon" title="Add task" onclick="openModal('task','${col.id}','${group.id}',null)">${SVG.plus}</button>
          <button class="gicon del" title="Delete group" onclick="openModal('del-group','${col.id}','${group.id}',null)">${SVG.trash}</button>
        </div>
      </div>`;
    }
    group.tasks.forEach(task=>{html+=renderTask(task,col.id,group.id)});
    html+=`<button class="add-btn" onclick="openModal('task','${col.id}','${group.id}',null)">${SVG.plus} Add task</button>`;
    html+=`</div>`;
  });
  html+=`<button class="add-btn" style="margin-top:6px;border-top:1px dashed var(--border2);padding-top:6px" onclick="openModal('group','${col.id}',null,null)">${SVG.plus} Add group</button>`;
  html+=`</div>`;

  el.innerHTML=html;
  return el;
}

function renderTask(task,colId,groupId){
  const dc=task.done?'done':'';
  let html=`<div class="task-row"><div class="task ${dc}">
    <input type="checkbox" ${task.done?'checked':''} onchange="toggleTask('${task.id}')">
    <span class="task-text" onclick="toggleTask('${task.id}')">${task.text}</span>
    <div class="task-actions">
      <button class="ticon" title="Add sub-task" onclick="openModal('sub','${colId}','${groupId}','${task.id}')">${SVG.plus}</button>
      <button class="ticon" title="Add comment" onclick="openModal('comment','${task.id}',null,null)">${SVG.msg}</button>
      <button class="ticon del" title="Delete" onclick="openModal('del-task','${colId}','${groupId}','${task.id}')">${SVG.trash}</button>
    </div>
  </div>`;

  if(task.comments&&task.comments.length){
    html+=`<div class="comments">`;
    task.comments.forEach(cm=>{
      html+=`<div class="comment"><span class="comment-text">💬 ${cm.text}</span><button class="comment-del" onclick="delComment('task','${task.id}',null,'${cm.id}')">×</button></div>`;
    });
    html+=`</div>`;
  }

  if(task.subs&&task.subs.length){
    html+=`<div class="subtasks">`;
    task.subs.forEach(sub=>{
      const sc=sub.done?'done':'';
      html+=`<div class="task subtask ${sc}">
        <input type="checkbox" ${sub.done?'checked':''} onchange="toggleSub('${task.id}','${sub.id}')">
        <span class="task-text" onclick="toggleSub('${task.id}','${sub.id}')">${sub.text}</span>
        <div class="task-actions">
          <button class="ticon" title="Add comment" onclick="openModal('comment-sub','${task.id}','${sub.id}',null)">${SVG.msg}</button>
          <button class="ticon del" title="Delete" onclick="openModal('del-sub','${task.id}','${sub.id}',null)">${SVG.trash}</button>
        </div>
      </div>`;
      if(sub.comments&&sub.comments.length){
        html+=`<div class="comments">`;
        sub.comments.forEach(cm=>{
          html+=`<div class="comment"><span class="comment-text">💬 ${cm.text}</span><button class="comment-del" onclick="delComment('sub','${task.id}','${sub.id}','${cm.id}')">×</button></div>`;
        });
        html+=`</div>`;
      }
    });
    html+=`</div>`;
  }

  return html+`</div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleTask(tid){
  for(const col of data.columns)for(const g of col.groups){
    const t=g.tasks.find(t=>t.id===tid);
    if(t){t.done=!t.done;save();render();return}
  }
}
function toggleSub(taskId,subId){
  for(const col of data.columns)for(const g of col.groups){
    const t=g.tasks.find(t=>t.id===taskId);
    if(t){const s=(t.subs||[]).find(s=>s.id===subId);if(s){s.done=!s.done;save();render();return}}
  }
}
function toggleCol(colId){
  const col=data.columns.find(c=>c.id===colId);
  if(col){col.collapsed=!col.collapsed;save();render()}
}
function delComment(level,id1,id2,cmId){
  if(level==='task'){
    for(const col of data.columns)for(const g of col.groups){
      const t=g.tasks.find(t=>t.id===id1);
      if(t){t.comments=t.comments.filter(c=>c.id!==cmId);save();render();return}
    }
  } else {
    for(const col of data.columns)for(const g of col.groups){
      const t=g.tasks.find(t=>t.id===id1);
      if(t){const s=(t.subs||[]).find(s=>s.id===id2);if(s){s.comments=s.comments.filter(c=>c.id!==cmId);save();render();return}}
    }
  }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(type,p1,p2,p3){
  pending={type,p1,p2,p3};
  const h=document.getElementById('m-title');
  const body=document.getElementById('m-body');
  const btns=document.getElementById('m-btns');
  const col=p1?data.columns.find(c=>c.id===p1):null;
  selColor=col?col.color:COLORS[0];
  const cancel=`<button class="mbtn" onclick="closeModal()">Cancel</button>`;
  const cp=()=>`<label>Header colour</label><div class="color-row">${COLORS.map(c=>`<div class="swatch${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('')}</div>`;

  if(type==='task'){
    h.textContent='Add task';
    body.innerHTML=`<input type="text" id="mi" placeholder="Task description...">`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Add task</button>`;
  } else if(type==='sub'){
    h.textContent='Add sub-task';
    body.innerHTML=`<input type="text" id="mi" placeholder="Sub-task description...">`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Add sub-task</button>`;
  } else if(type==='comment'){
    h.textContent='Add comment';
    body.innerHTML=`<textarea id="mi" placeholder="Type your comment..."></textarea>`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Add comment</button>`;
  } else if(type==='comment-sub'){
    h.textContent='Add comment';
    body.innerHTML=`<textarea id="mi" placeholder="Type your comment..."></textarea>`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Add comment</button>`;
  } else if(type==='group'){
    h.textContent='Add group';
    body.innerHTML=`<input type="text" id="mi" placeholder="Group name, e.g. Renault">`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Add group</button>`;
  } else if(type==='new-col'){
    h.textContent='Add column';
    body.innerHTML=`<label>Column name</label><input type="text" id="mi" placeholder="e.g. Daniel Smith">${cp()}`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Add column</button>`;
  } else if(type==='edit-col'){
    h.textContent='Edit column';
    body.innerHTML=`<label>Column name</label><input type="text" id="mi" value="${col.label}">${cp()}`;
    btns.innerHTML=cancel+`<button class="mbtn ok" onclick="submitModal()">Save</button>`;
  } else if(type==='del-col'){
    h.textContent='Delete column';
    body.innerHTML=`<p class="confirm-text">Delete <strong>${col.label}</strong> and everything in it?</p>`;
    btns.innerHTML=cancel+`<button class="mbtn danger" onclick="submitModal()">Delete column</button>`;
  } else if(type==='del-group'){
    const g=col.groups.find(g=>g.id===p2);
    h.textContent='Delete group';
    body.innerHTML=`<p class="confirm-text">Delete <strong>${g.label}</strong> and all its tasks?</p>`;
    btns.innerHTML=cancel+`<button class="mbtn danger" onclick="submitModal()">Delete group</button>`;
  } else if(type==='del-task'){
    h.textContent='Delete task';
    body.innerHTML=`<p class="confirm-text">Delete this task and everything under it?</p>`;
    btns.innerHTML=cancel+`<button class="mbtn danger" onclick="submitModal()">Delete task</button>`;
  } else if(type==='del-sub'){
    h.textContent='Delete sub-task';
    body.innerHTML=`<p class="confirm-text">Delete this sub-task?</p>`;
    btns.innerHTML=cancel+`<button class="mbtn danger" onclick="submitModal()">Delete</button>`;
  }

  document.getElementById('overlay').classList.add('open');
  const inp=document.getElementById('mi');
  if(inp)setTimeout(()=>{inp.focus();if(inp.select)inp.select()},50);
}

function pickColor(c){
  selColor=c;
  document.querySelectorAll('.swatch').forEach(el=>el.classList.toggle('sel',el.style.background===c));
}
function closeModal(){document.getElementById('overlay').classList.remove('open');pending=null}

function submitModal(){
  if(!pending)return closeModal();
  const {type,p1,p2,p3}=pending;
  const inp=document.getElementById('mi');
  const text=inp?inp.value.trim():'';
  const col=p1?data.columns.find(c=>c.id===p1):null;

  if(type==='task'){
    if(!text)return;
    col.groups.find(g=>g.id===p2).tasks.push({id:uid(),text,done:false,subs:[],comments:[]});
  } else if(type==='sub'){
    if(!text)return;
    for(const c of data.columns)for(const g of c.groups){
      const t=g.tasks.find(t=>t.id===p3);
      if(t){t.subs.push({id:uid(),text,done:false,comments:[]});break}
    }
  } else if(type==='comment'){
    if(!text)return;
    // p1=taskId
    for(const c of data.columns)for(const g of c.groups){
      const t=g.tasks.find(t=>t.id===p1);
      if(t){if(!t.comments)t.comments=[];t.comments.push({id:uid(),text});break}
    }
  } else if(type==='comment-sub'){
    if(!text)return;
    // p1=taskId, p2=subId
    for(const c of data.columns)for(const g of c.groups){
      const t=g.tasks.find(t=>t.id===p1);
      if(t){const s=t.subs.find(s=>s.id===p2);if(s){if(!s.comments)s.comments=[];s.comments.push({id:uid(),text});break}}
    }
  } else if(type==='group'){
    if(!text)return;
    col.groups.push({id:uid(),label:text,tasks:[]});
  } else if(type==='new-col'){
    if(!text)return;
    let row=0,newCol=0;
    if(p3==='below'){
      // Find the next available row after this column's row
      const thisRow=col.row;
      const nextRow=thisRow+1;
      // Check if that row already has a column at col position 0
      // Just add to next row at col 0, don't shift anything
      row=nextRow;newCol=0;
    } else if(p3&&typeof p3==='object'){
      row=p3.row;newCol=p3.col;
    }
    data.columns.push({id:uid(),label:text,color:selColor,collapsed:false,row,col:newCol,groups:[{id:uid(),label:'',tasks:[]}]});
  } else if(type==='edit-col'){
    if(!text)return;
    col.label=text;col.color=selColor;
  } else if(type==='del-col'){
    data.columns=data.columns.filter(c=>c.id!==p1);
    toast('Column deleted');
  } else if(type==='del-group'){
    col.groups=col.groups.filter(g=>g.id!==p2);
    toast('Group deleted');
  } else if(type==='del-task'){
    const g=col.groups.find(g=>g.id===p2);
    g.tasks=g.tasks.filter(t=>t.id!==p3);
    toast('Task deleted');
  } else if(type==='del-sub'){
    // p1=taskId, p2=subId
    for(const c of data.columns)for(const g of c.groups){
      const t=g.tasks.find(t=>t.id===p1);
      if(t){t.subs=t.subs.filter(s=>s.id!==p2);break}
    }
    toast('Sub-task deleted');
  }

  save();render();closeModal();
}

// ─── CLEAR / EXPORT ──────────────────────────────────────────────────────────
function clearDone(){
  data.columns.forEach(col=>col.groups.forEach(g=>{
    g.tasks=g.tasks.filter(t=>!t.done);
    g.tasks.forEach(t=>{if(t.subs)t.subs=t.subs.filter(s=>!s.done)});
  }));
  save();render();toast('Done items cleared');
}
function exportMd(){
  let out='# Jayco Team Board\nExported: '+new Date().toLocaleString()+'\n\n';
  data.columns.sort((a,b)=>a.row-b.row||a.col-b.col).forEach(col=>{
    out+=`## ${col.label}\n`;
    col.groups.forEach(g=>{
      if(g.label)out+=`### ${g.label}\n`;
      g.tasks.forEach(t=>{
        out+=`- [${t.done?'x':' '}] ${t.text}\n`;
        (t.comments||[]).forEach(c=>out+=`  > 💬 ${c.text}\n`);
        (t.subs||[]).forEach(s=>{
          out+=`  - [${s.done?'x':' '}] ${s.text}\n`;
          (s.comments||[]).forEach(c=>out+=`    > 💬 ${c.text}\n`);
        });
      });
    });
    out+='\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([out],{type:'text/markdown'}));
  a.download='jayco-board-'+new Date().toISOString().slice(0,10)+'.md';
  a.click();toast('Exported');
}

// ─── DRAG AND DROP ───────────────────────────────────────────────────────────
function onDragStart(e){dragId=this.dataset.id;this.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function onDragOver(e){e.preventDefault();if(this.dataset.id!==dragId)this.classList.add('drag-over')}
function onDragLeave(){this.classList.remove('drag-over')}
function onDrop(e){
  e.preventDefault();this.classList.remove('drag-over');
  const targetId=this.dataset.id;
  if(!dragId||dragId===targetId)return;
  const from=data.columns.find(c=>c.id===dragId);
  const to=data.columns.find(c=>c.id===targetId);
  if(!from||!to)return;
  const fr=from.row,fc=from.col,tr=to.row,tc=to.col;
  from.row=tr;from.col=tc;to.row=fr;to.col=fc;
  save();render();
}
function onDragEnd(){document.querySelectorAll('.col').forEach(el=>el.classList.remove('dragging','drag-over'));dragId=null}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal()});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')){
    const inp=document.getElementById('mi');
    if(inp&&inp.tagName==='INPUT'&&document.activeElement===inp)submitModal();
  }
});

render();
</script>
